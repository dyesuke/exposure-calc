<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exposure Field Guide</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; font-family: 'Courier New', monospace; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
  const { useState, useMemo } = React;
  const e = React.createElement;

  // ── データ ──────────────────────────────────────────────────
  const SHUTTER_SPEEDS = [
    { label: "1/4000", value: 1/4000 }, { label: "1/3200", value: 1/3200 },
    { label: "1/2500", value: 1/2500 }, { label: "1/2000", value: 1/2000 },
    { label: "1/1600", value: 1/1600 }, { label: "1/1250", value: 1/1250 },
    { label: "1/1000", value: 1/1000 }, { label: "1/800",  value: 1/800  },
    { label: "1/640",  value: 1/640  }, { label: "1/500",  value: 1/500  },
    { label: "1/400",  value: 1/400  }, { label: "1/320",  value: 1/320  },
    { label: "1/250",  value: 1/250  }, { label: "1/200",  value: 1/200  },
    { label: "1/160",  value: 1/160  }, { label: "1/125",  value: 1/125  },
    { label: "1/100",  value: 1/100  }, { label: "1/80",   value: 1/80   },
    { label: "1/60",   value: 1/60   }, { label: "1/50",   value: 1/50   },
    { label: "1/40",   value: 1/40   }, { label: "1/30",   value: 1/30   },
    { label: "1/25",   value: 1/25   }, { label: "1/20",   value: 1/20   },
    { label: "1/15",   value: 1/15   }, { label: "1/13",   value: 1/13   },
    { label: "1/10",   value: 1/10   }, { label: "1/8",    value: 1/8    },
    { label: "1/6",    value: 1/6    }, { label: "1/5",    value: 1/5    },
    { label: "1/4",    value: 1/4    }, { label: "1/3",    value: 1/3    },
    { label: "1/2",    value: 1/2    }, { label: "1s",     value: 1      },
  ];

  const SCENES = {
    sunny_clear:      { icon: "☀️", label: "快晴", sub: "ハイライト基準", ev: { sunny16: 15, otaky8: 14 }, apertures: { sunny16: [8, 11, 16, 22], otaky8: [5.6, 8, 11, 16] }, highlight: 1 },
    sunny_bright:     { icon: "☀️", label: "快晴", sub: "ネガ向け明るめ",  ev: { sunny16: 14, otaky8: 14 }, apertures: { sunny16: [8, 11, 16, 22], otaky8: [5.6, 8, 11, 16] }, highlight: 1 },
    sunny_shadow:     { icon: "🌓", label: "快晴", sub: "影を出したい",    ev: { sunny16: 13, otaky8: 13 }, apertures: { sunny16: [5.6, 8, 11, 16], otaky8: [4, 5.6, 8, 11] }, highlight: 1 },
    cloudy:           { icon: "🌤", label: "曇り", sub: "薄曇り",          ev: { sunny16: 13, otaky8: 13 }, apertures: { sunny16: [5.6, 8, 11, 16], otaky8: [5.6, 8, 11, 16] }, highlight: 1 },
    overcast:         { icon: "☁️", label: "曇り", sub: "どんより曇り",    ev: { sunny16: 12, otaky8: 12 }, apertures: { sunny16: [4, 5.6, 8, 11],  otaky8: [4, 5.6, 8, 11]  }, highlight: 1 },
    golden_highlight: { icon: "🌅", label: "朝夕", sub: "日が当たる面",    ev: { sunny16: 13, otaky8: 13 }, apertures: { sunny16: [5.6, 8, 11, 16], otaky8: [5.6, 8, 11, 16] }, highlight: 1 },
    golden_shadow:    { icon: "🌆", label: "朝夕", sub: "影を出したい",    ev: { sunny16: 11, otaky8: 11 }, apertures: { sunny16: [2.8, 4, 5.6, 8],  otaky8: [2.8, 4, 5.6, 8] }, highlight: 1 },
    night:            { icon: "🌃", label: "夜",   sub: "街灯・ネオン",    ev: { sunny16: 8,  otaky8: 8  }, apertures: { sunny16: [1.4, 1.8, 2.0, 2.8], otaky8: [1.4, 1.8, 2.0, 2.8] }, highlight: 0 },
  };

  const TIME_GROUPS = [
    { label: "快晴", keys: ["sunny_clear", "sunny_bright", "sunny_shadow"] },
    { label: "曇り", keys: ["cloudy", "overcast"] },
    { label: "朝夕", keys: ["golden_highlight", "golden_shadow"] },
    { label: "夜",   keys: ["night"] },
  ];

  const C = {
    bg: "#0f0f0f", surface: "#171717", border: "#252525", borderHi: "#333",
    text: "#ddd8d0", textDim: "#777", textMute: "#444",
    accent16: "#c8b88a", accent8: "#7eb8a4",
  };
  const mono = "'Courier New', monospace";

  // ── 計算 ────────────────────────────────────────────────────
  function isoEVCorrection(iso) { return Math.log2(iso / 100); }

  function targetEV(sceneKey, mode, iso) {
    return SCENES[sceneKey].ev[mode] + isoEVCorrection(iso);
  }

  function bestCombinations(sceneKey, mode, iso) {
    const ev = targetEV(sceneKey, mode, iso);
    return SCENES[sceneKey].apertures[mode].map(ap => {
      const idealShutter = (ap * ap) / Math.pow(2, ev);
      let best = SHUTTER_SPEEDS[0], minDiff = Infinity;
      for (const s of SHUTTER_SPEEDS) {
        const diff = Math.abs(Math.log2(s.value) - Math.log2(idealShutter));
        if (diff < minDiff) { minDiff = diff; best = s; }
      }
      return { aperture: ap, shutter: best.label, evDiff: Math.log2((ap*ap)/best.value) - ev };
    });
  }

  // ── App ─────────────────────────────────────────────────────
  function App() {
    const [mode, setMode] = useState("sunny16");
    const [isoInput, setIsoInput] = useState("400");
    const [scene, setScene] = useState("sunny_bright");

    const iso = useMemo(() => { const n = parseInt(isoInput); return (!isNaN(n) && n > 0) ? n : 400; }, [isoInput]);
    const combos = useMemo(() => bestCombinations(scene, mode, iso), [scene, mode, iso]);
    const accent = mode === "sunny16" ? C.accent16 : C.accent8;
    const sceneData = SCENES[scene];
    const evBase = targetEV(scene, mode, iso);
    const evFromS16 = evBase - (15 + isoEVCorrection(iso));

    const btn = (onClick, active, col, children, extra = {}) =>
      e("button", {
        onClick,
        style: {
          fontFamily: mono, cursor: "pointer", border: `1px solid ${active ? col : C.border}`,
          background: active ? col : "transparent", color: active ? "#111" : C.textDim,
          borderRadius: 2, transition: "all 0.15s", fontWeight: active ? 700 : 400, ...extra
        }
      }, children);

    return e("div", { style: { minHeight: "100vh", background: C.bg, color: C.text, fontFamily: mono } },

      // Header
      e("div", { style: { borderBottom: `1px solid ${C.border}`, padding: "16px 20px 12px", display: "flex", alignItems: "baseline", gap: 10 } },
        e("span", { style: { fontSize: 10, letterSpacing: "0.2em", color: C.textDim } }, "Exposure"),
        e("span", { style: { fontSize: 17, fontWeight: 700, letterSpacing: "0.04em" } }, " FIELD GUIDE"),
      ),

      e("div", { style: { padding: "18px 20px", maxWidth: 480 } },

        // Mode
        e("div", { style: { marginBottom: 22 } },
          e("div", { style: { fontSize: 10, letterSpacing: "0.2em", color: C.textDim, marginBottom: 8 } }, "MODE"),
          e("div", { style: { display: "flex", border: `1px solid ${C.border}`, borderRadius: 2, overflow: "hidden", width: "fit-content" } },
            ...[
              { key: "sunny16", label: "SUNNY 16",  desc: "F16 厳密基準", col: C.accent16 },
              { key: "otaky8",  label: "OTAKKY 8", desc: "F8〜11 実戦派", col: C.accent8 },
            ].map(m =>
              e("button", {
                key: m.key, onClick: () => setMode(m.key),
                style: {
                  padding: "9px 20px", fontFamily: mono, fontSize: 12, letterSpacing: "0.08em",
                  fontWeight: mode === m.key ? 700 : 400, border: "none", cursor: "pointer",
                  background: mode === m.key ? m.col : "transparent",
                  color: mode === m.key ? "#111" : C.textDim, transition: "all 0.15s",
                }
              },
                m.label,
                e("span", { style: { display: "block", fontSize: 9, fontWeight: 400, opacity: 0.7, marginTop: 1 } }, m.desc)
              )
            )
          )
        ),

        // ISO
        e("div", { style: { marginBottom: 20 } },
          e("div", { style: { fontSize: 10, letterSpacing: "0.2em", color: C.textDim, marginBottom: 8 } }, "ISO"),
          e("div", { style: { display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" } },
            ...[100, 200, 400, 800, 1600].map(v =>
              btn(() => setIsoInput(String(v)), iso === v, accent, v, { padding: "6px 13px", fontSize: 13 })
            ),
            e("input", {
              type: "number", value: isoInput, onChange: ev => setIsoInput(ev.target.value),
              placeholder: "任意",
              style: { width: 68, padding: "6px 10px", fontSize: 13, fontFamily: mono, background: "transparent", color: C.text, border: `1px solid ${C.borderHi}`, borderRadius: 2, outline: "none" }
            })
          ),
          ![100,200,400,800,1600].includes(iso) && e("div", { style: { marginTop: 6, fontSize: 11, color: C.textDim } },
            `ISO ${iso} — サニー16基準から ${isoEVCorrection(iso) >= 0 ? "+" : ""}${Math.round(isoEVCorrection(iso)*10)/10} 段補正`
          )
        ),

        // Scene
        e("div", { style: { marginBottom: 24 } },
          e("div", { style: { fontSize: 10, letterSpacing: "0.2em", color: C.textDim, marginBottom: 10 } }, "シーン"),
          ...TIME_GROUPS.map(g =>
            e("div", { key: g.label, style: { marginBottom: 10 } },
              e("div", { style: { fontSize: 9, color: C.textMute, letterSpacing: "0.15em", marginBottom: 5 } }, g.label),
              e("div", { style: { display: "flex", gap: 5, flexWrap: "wrap" } },
                ...g.keys.map(k =>
                  btn(() => setScene(k), scene === k, accent,
                    `${SCENES[k].icon} ${SCENES[k].sub}`,
                    { padding: "6px 11px", fontSize: 11 }
                  )
                )
              )
            )
          )
        ),

        // Results
        e("div", { style: { borderTop: `1px solid ${C.border}`, paddingTop: 20 } },
          e("div", { style: { marginBottom: 12, display: "flex", alignItems: "center", gap: 8 } },
            e("span", { style: { fontSize: 9, letterSpacing: "0.2em", color: C.textMute } }, "推奨設定"),
            e("span", { style: { fontSize: 10, color: C.textDim } }, `${sceneData.icon} ${sceneData.label} · ${sceneData.sub} · ISO ${iso}`)
          ),

          e("div", { style: { display: "grid", gap: 2, marginBottom: 14 } },
            ...combos.map(({ aperture, shutter, evDiff }, i) => {
              const isHi = i === sceneData.highlight;
              const diffStr = Math.abs(evDiff) < 0.15 ? "±0"
                : evDiff > 0 ? `+${(Math.round(evDiff*3)/3).toFixed(1)}段`
                : `${(Math.round(evDiff*3)/3).toFixed(1)}段`;
              return e("div", {
                key: i,
                style: { display: "grid", gridTemplateColumns: "88px 96px 1fr", alignItems: "center", padding: "9px 12px", background: isHi ? C.surface : "transparent", border: `1px solid ${isHi ? accent+"55" : "transparent"}`, borderRadius: 2 }
              },
                e("span", { style: { fontSize: 19, fontWeight: 700, color: isHi ? C.text : C.textMute, letterSpacing: "-0.02em" } }, `F${aperture}`),
                e("span", { style: { fontSize: 19, fontWeight: 700, color: isHi ? C.text : C.textMute, letterSpacing: "-0.02em" } }, shutter),
                e("span", { style: { fontSize: 10, color: isHi ? accent : C.textMute } }, isHi ? "◀ おすすめ" : diffStr)
              );
            })
          ),

          // EV + 絞り比較パネル
          e("div", { style: { background: C.surface, borderRadius: 2, overflow: "hidden" } },
            // EV行
            e("div", { style: { padding: "8px 12px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" } },
              e("span", { style: { fontSize: 10, color: C.textMute } }, "EV"),
              e("span", { style: { fontSize: 14, fontWeight: 700, color: accent } },
                `${Math.round(evBase*10)/10}`,
                e("span", { style: { fontSize: 10, fontWeight: 400, color: C.textMute, marginLeft: 8 } },
                  `(サニー16基準 ${evFromS16 >= 0 ? "+" : ""}${Math.round(evFromS16*10)/10} 段)`
                )
              )
            ),
            // 絞りセット比較
            e("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr" } },
              ...[
                { key: "sunny16", label: "SUNNY 16",  col: C.accent16 },
                { key: "otaky8",  label: "OTAKKY 8", col: C.accent8 },
              ].map(m => {
                const aps = SCENES[scene].apertures[m.key];
                const isActive = mode === m.key;
                return e("div", {
                  key: m.key,
                  style: { padding: "10px 12px", borderRight: m.key === "sunny16" ? `1px solid ${C.border}` : "none", background: isActive ? m.col + "18" : "transparent" }
                },
                  e("div", { style: { fontSize: 9, color: m.col, letterSpacing: "0.15em", marginBottom: 6 } }, `${m.label}${isActive ? " ●" : ""}`),
                  e("div", { style: { display: "flex", gap: 4, flexWrap: "wrap" } },
                    ...aps.map((ap, i) => {
                      const isRec = i === sceneData.highlight;
                      return e("span", {
                        key: ap,
                        style: {
                          fontSize: isRec ? 13 : 11, fontWeight: isRec ? 700 : 400,
                          color: isRec ? (isActive ? m.col : C.text) : C.textMute,
                          padding: isRec ? "1px 5px" : "1px 3px",
                          border: isRec ? `1px solid ${isActive ? m.col+"88" : C.borderHi}` : "1px solid transparent",
                          borderRadius: 2,
                        }
                      }, `F${ap}`);
                    })
                  )
                );
              })
            ),
            // 絞りセット差の注記
            JSON.stringify(SCENES[scene].apertures.sunny16) !== JSON.stringify(SCENES[scene].apertures.otaky8) &&
              e("div", { style: { padding: "6px 12px", borderTop: `1px solid ${C.border}`, fontSize: 9, color: C.textMute, letterSpacing: "0.06em" } },
                "↑ モードで絞りセットが異なります"
              )
          )
        )
      )
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
